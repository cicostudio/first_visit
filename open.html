<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>首次體驗預約</title>

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: #f8fafc;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      box-sizing: border-box;
      overscroll-behavior-y: none;
    }
    .icon-box {
      width: 90px; height: 90px; background: #06c755; border-radius: 24px; margin-bottom: 24px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 10px 20px rgba(6, 199, 85, 0.2);
    }
    .icon-box svg { width: 45px; height: 45px; fill: white; }
    h1 { font-size: 22px; color: #1e293b; margin: 0 0 12px; font-weight: 700; }
    p { font-size: 15px; color: #64748b; margin: 0 0 32px; line-height: 1.6; max-width: 400px; }
    .btn-main {
      display: block; width: 100%; max-width: 300px; padding: 16px 0;
      background-color: #06c755; color: white;
      border-radius: 50px; text-decoration: none; font-size: 16px; font-weight: bold;
      box-shadow: 0 4px 12px rgba(6, 199, 85, 0.3);
      cursor: pointer; border: none; outline: none; transition: all 0.2s;
    }
    .btn-main:active { opacity: 0.9; transform: scale(0.98); }
  </style>
</head>
<body>

  <div class="icon-box">
    <svg viewBox="0 0 24 24"><path d="M21.6 11.2c0-4.6-4.3-8.4-9.6-8.4S2.4 6.6 2.4 11.2c0 4.1 3.6 7.6 8.4 8.2v0.1l-1.2 3.8c-0.1 0.4 0.2 0.7 0.5 0.7 0.2 0 0.3-0.1 0.4-0.1l4.9-3.4h0.1c3.5-0.6 6.1-4.1 6.1-8.3z"/></svg>
  </div>
  <h1>首次體驗預約</h1>
  <p>請點擊下方按鈕<br>開啟 LINE 完成預約</p>
  <a id="openBtn" class="btn-main" href="#">立即預約</a>

  <script>
    /***** 設定區域 *****/
    const LIFF_URL = "https://liff.line.me/2001467446-KNVd49W2";
    /********************/

    // 這個頁面唯一的工作:把自己收到的所有網址參數(utm_source、utm_campaign、
    // 未來可能新增的推薦碼等),原封不動接力轉貼到 LIFF 網址後面。
    // 不列白名單、不判斷參數內容,之後新增任何追蹤參數都不需要回來改這個檔案。
    //
    // href 在使用者按下去之前就先設定好,實際觸發導頁的是使用者「真的用手指點擊」
    // 這個 <a> 連結,而不是程式自動導頁——這正是這一頁存在的目的:比起在廣告平台的
    // 內建瀏覽器裡自動轉址,由真人點擊觸發的連結,能大幅提高手機系統判斷「該用 LINE
    // App 開啟」的成功率。所以這裡刻意不寫任何自動倒數轉址的邏輯。
    const incomingParams = window.location.search; // 例如 "?utm_source=fb&utm_campaign=mommy2026"
    const separator = LIFF_URL.includes('?') ? '&' : '?';
    const targetUrl = incomingParams
      ? `${LIFF_URL}${separator}${incomingParams.slice(1)}`
      : LIFF_URL;

    document.getElementById('openBtn').href = targetUrl;
  </script>
</body>
</html>
